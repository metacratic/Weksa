schema_version: weksa.cultural_ontology_profile.v0
profile_id: weksa.culture.western_europe_maritime_childhood.v0
kind: mobility_childhood
status: draft_guarded
community:
  regions:
    - France
    - Spain
    - Portugal
    - coastal_western_europe
  speech_community: >
    Mobile childhood organized around sailing, ports, and cross-border Western
    European movement. This profile is owner-attested for the Metame fixture and
    needs more Discord corroboration before broader use.
activation:
  allowed_when:
    - persona_state_references_profile
    - interlingua_mentions_childhood_origin_mobility_boats_or_home
  forbidden_when:
    - used_as_decorative_nautical_metaphor_without_context
salience_axes:
  mobile_home:
    axis_id: mobile_home
    domain: identity_indexing
    description: Home can be vessel, coast, port, family movement, and country sequence rather than one fixed town.
    relevant_distinctions:
      - distinction_id: vessel_as_childhood_home
        label: Vessel as childhood home
        meaning: A sailboat childhood makes movement and locality primary ontology fields.
        lowering_questions:
          - Does the line invoke home, travel, borders, coast, or rootedness?
        required_when:
          - source_mentions_childhood_or_home
        forbidden_when:
          - scene_has_no_mobility_or_home_salience
        evidence_refs:
          - owner:2026-06-10:sailboat_france_spain_portugal_until_6
evidence_ledger:
  - ref: owner:2026-06-10:sailboat_france_spain_portugal_until_6
    quote: "I was born in the Netherlands, grew up on a sailboat traveling France, Spain, staying in Portugal until I was 6, moved to the US."
  - ref: discord-search-gap:sailboat_childhood
    summary: First semantic search did not locate a direct Discord message for this exact childhood account.
linguistic_affordances:
  grammar_features: []
  phonology_features: []
  lexicon_features: []
  discourse_patterns: []
  orthography_features: []
  code_switching:
    allowed: false
    constraints:
      - Do not infer French, Spanish, Portuguese, or Dutch fluency from movement alone.
    patterns: []
