schema_version: weksa.cultural_ontology_profile.v0
profile_id: weksa.culture.dutch_american_diaspora.v0
kind: diaspora_identity
status: draft_guarded
language:
  codes:
    - en
    - nl
community:
  regions:
    - Netherlands
    - United States
  speech_community: >
    People whose self-description or life history crosses Dutch origin and
    American nationality/residence. This profile is not a dialect claim.
activation:
  allowed_when:
    - persona_state_references_profile
    - interlingua_mentions_origin_nationality_or_cross_cultural_identity
  forbidden_when:
    - used_to_infer_accent_or_fluency_without_evidence
    - used_as_generic_dutch_or_generic_american_stereotype
salience_axes:
  plural_national_identity:
    axis_id: plural_national_identity
    domain: identity_indexing
    description: Birthplace, citizenship, residence, and cultural identification may diverge.
    relevant_distinctions:
      - distinction_id: birthplace_vs_citizenship
        label: Birthplace versus citizenship
        meaning: Being born in one country and holding identity/citizenship in another are separate ontology fields.
        lowering_questions:
          - Does the utterance need origin, nationality, residence, or cultural affiliation?
        required_when:
          - source_mentions_identity_origin_or_nationality
        forbidden_when:
          - scene_only_requires_casual_banter
        evidence_refs:
          - discord:805822798185627718
          - discord:1030577958215225396
evidence_ledger:
  - ref: discord:805822798185627718
    quote: "I live in Portugal at the moment, though I am a Netherlands-born US citizen - lived mostly in Texas"
  - ref: discord:1030577958215225396
    quote: "Dual nationality, Dutch American"
  - ref: discord:862490040755683348
    quote: "I was born in the Netherlands but I'm a US citizen and did high school in Houston, Texas."
linguistic_affordances:
  grammar_features: []
  phonology_features: []
  lexicon_features: []
  discourse_patterns: []
  orthography_features: []
  code_switching:
    allowed: false
    constraints:
      - Do not infer Dutch code switching from diaspora identity alone.
    patterns: []
