schema_version: weksa.cultural_ontology_profile.v0
profile_id: weksa.cultural_referent.old_norse_edda_source_tradition.v0
kind: literary_source_tradition
status: draft_guarded
language:
  codes:
    - en
    - non
community:
  regions:
    - medieval_icelandic_textual_tradition
  speech_community: >
    Shared source-tradition profile for Personas that explicitly derive voice,
    role, or symbolic pressure from the Poetic Edda, Prose Edda, or named Eddic
    figures. This profile supports lowering source-shaped Persona intent into
    natural speech without turning the Eddas into generic Norse ambience.
  historical_context: >
    The Poetic Edda preserves mythological and heroic poems from the Old Norse
    tradition, including major source material for Odin, Mimir, Loki, Vili,
    dwarfs, prophecy, wisdom, oaths, doom, and divine conflict. The Prose Edda
    is a medieval Icelandic prose and poetic handbook preserving and explaining
    many related myths, names, kennings, and narrative episodes.
  identity_authority: >
    Use this as a source-text referent only. It does not own modern Nordic,
    Icelandic, Scandinavian, heathen, pagan, or reconstructed historical speech
    communities. Persona-specific profiles should specialize this profile when
    a named figure, episode, or role has its own lowering constraints.
  consent_notes: >
    This profile is for fictional Persona/source-text lowering. It must not be
    used to infer ethnicity, accent, religion, or modern identity. Do not use it
    as costume authority for unrelated characters.
activation:
  allowed_when:
    - persona_state_references_profile
    - persona_identity_references_poetic_edda_prose_edda_or_named_edda_figure
    - interlingua_requests_edda_source_tradition_pressure
  forbidden_when:
    - used_as_generic_norse_viking_or_fantasy_voice
    - used_to_infer_modern_scandinavian_identity_or_accent
    - used_for_ambient_mythic_flavor_without_source_role_pressure
    - used_to_override_persona_specific_profile_constraints
  required_confidence: provisional
  reviewer_required_when:
    - quoting_source_text_directly
    - making_claims_about_historical_old_norse_language_or_religion
    - extending_to_living_cultural_or_religious_practice
salience_axes:
  named_role_over_archetype:
    axis_id: named_role_over_archetype
    domain: identity_indexing
    description: Eddic figures should lower from specific source roles and episodes, not generic mythic archetypes.
    relevant_distinctions:
      - distinction_id: source_episode_vs_costume
        label: Source episode versus costume
        meaning: A figure's voice pressure comes from named acts, obligations, relations, and losses rather than from broad "Norse" styling.
        lowering_questions:
          - Which named figure, poem, prose episode, relation, or source role is active?
          - Is the line preserving that role, or merely adding mythic decoration?
          - Does a Persona-specific profile exist that should override this general profile?
        required_when:
          - persona_identity_references_edda_named_figure
        forbidden_when:
          - source_role_is_unknown_or_unclaimed
        evidence_refs:
          - poetic_edda:bellows:general
          - prose_edda:brodeur:general
  oath_debt_fate_and_witness:
    axis_id: oath_debt_fate_and_witness
    domain: modality
    description: Oaths, pledges, debts, prophecy, witness, and consequence are recurring source pressures.
    relevant_distinctions:
      - distinction_id: consequence_not_mood
        label: Consequence, not mood
        meaning: Binding speech and known doom should affect obligation, consequence, and restraint rather than simply making a line sound severe.
        lowering_questions:
          - Is the utterance about a promise, bargain, pledge, prophecy, debt, or witness?
          - What consequence is structurally implied?
          - Should the line be spare because the consequence is heavy?
        required_when:
          - interlingua_mentions_oath_debt_pledge_witness_prophecy_or_doom
        forbidden_when:
          - line_is_only_casual_social_contact
        evidence_refs:
          - poetic_edda:voluspa
          - prose_edda:gylfaginning
  wisdom_cost_and_memory:
    axis_id: wisdom_cost_and_memory
    domain: evidentiality
    description: Knowledge in Eddic source pressure often has cost, pledge, sacrifice, witness, or memory attached.
    relevant_distinctions:
      - distinction_id: knowledge_is_paid_for
        label: Knowledge is paid for
        meaning: Knowing is not decorative omniscience; it may come through loss, risk, pledge, memory, or guarded source.
        lowering_questions:
          - What did this Persona pay, guard, lose, remember, or witness in order to know?
          - Is the line claiming knowledge with enough evidence and cost pressure?
        required_when:
          - persona_is_mimir_odin_huginn_or_other_wisdom_memory_figure
          - interlingua_mentions_secret_wisdom_memory_or_sight
        forbidden_when:
          - claim_is_unearned_style_or_generic_omniscience
        evidence_refs:
          - poetic_edda:voluspa:mimir_well
          - prose_edda:gylfaginning:mimir_well
  translated_edda_plainness:
    axis_id: translated_edda_plainness
    domain: discourse
    description: Source-shaped English should be compact, declarative, concrete, and relation-aware without fake archaism.
    relevant_distinctions:
      - distinction_id: plain_force_without_fake_oldness
        label: Plain force without fake oldness
        meaning: Preserve the translated Edda's economy, parallel pressure, and concrete naming; avoid "ye olde" parody.
        lowering_questions:
          - Can this line become shorter and harder without losing meaning?
          - Which archaic words are costume rather than source pressure?
          - What relationship, cost, or consequence needs to remain visible?
        required_when:
          - edda_profile_activated_for_english_surface
        forbidden_when:
          - modern_plain_speech_better_serves_the_persona_and_context
        evidence_refs:
          - poetic_edda:bellows:general
          - prose_edda:brodeur:general
linguistic_affordances:
  grammar_features: []
  phonology_features: []
  lexicon_features:
    - feature_id: source_role_lexicon
      label: Source-role lexicon
      status: draft
      domain:
        layer: lexicon
        category: literary_source_register
      description: Use concrete source-role words only when the interlingua earns them: oath, pledge, debt, witness, doom, well, eye, raven, forge, bargain, gift, mouth, ring, root, road, wolf, ash.
      realization:
        function: Preserve source salience without copying source text or inventing Old Norse speech.
        surface_strategy: Choose one or two concrete source-role nouns when they clarify role, obligation, or consequence.
        examples:
          - "That pledge bought sight."
          - "The witness is not the owner."
          - "A bargain without a receipt is only noise."
      activation:
        allowed_when:
          - interlingua_contains_source_role_obligation_or_witness_pressure
        forbidden_when:
          - source_words_would_only_add_ambience
        requires_profile_authority: true
        minimum_density: sparse
        maximum_density: sparse
      constraints:
        register_contexts:
          - English rendered Persona speech
        speaker_contexts:
          - Explicitly Eddic or Norse-derived Persona
        collocation_limits:
          - Avoid stacking mythic nouns until the line turns into an inventory.
        incompatibilities:
          - generic Viking flavor
          - faux-archaic accent spelling
      indexicality:
        social_meanings:
          - source-grounded role pressure
          - obligation
          - witness
        in_group_meanings:
          - Eddic referent is active and bounded
        out_group_risks:
          - kitsch
          - religious or ethnic flattening
          - fantasy stereotype
        stereotypes_to_avoid:
          - horned-helmet Viking voice
          - gruff dwarf as universal Norse style
          - omniscient wizard fog
      evidence:
        source_refs:
          - poetic_edda:bellows:general
          - prose_edda:brodeur:general
        confidence: medium
      uncertainty:
        open_questions:
          - Which source-role lexemes should be promoted into Persona-specific child profiles?
        known_limits:
          - This profile does not provide Old Norse vocabulary or pronunciation authority.
      trace:
        trace_label: source_role_lexicon
        must_report_when_used: true
        must_report_when_rejected: true
  discourse_patterns:
    - feature_id: gnomic_claim_with_anchor
      label: Gnomic claim with anchor
      status: draft
      domain:
        layer: discourse
        category: compressed_wisdom_claim
      description: A compact general claim may be allowed when anchored to a concrete source role, cost, witness, or consequence.
      realization:
        function: Let wisdom- or fate-shaped Personas speak with source pressure while keeping claims inspectable.
        surface_strategy: Pair the general claim with a concrete anchor or consequence.
        examples:
          - "Wisdom without cost is a loose tongue."
          - "A witness names the thing and does not become it."
      activation:
        allowed_when:
          - interlingua_contains_general_judgment_plus_source_anchor
        forbidden_when:
          - output_would_become_free_floating_proverb
        requires_profile_authority: true
        minimum_density: sparse
        maximum_density: sparse
      constraints:
        register_contexts:
          - English rendered Persona speech
        speaker_contexts:
          - Eddic or Norse-derived Persona
        collocation_limits:
          - One compact claim per utterance unless the social move is explicitly ceremonial.
        incompatibilities:
          - vague prophecy
          - decorative doom language
      indexicality:
        social_meanings:
          - remembered cost
          - restrained authority
          - source-shaped judgment
        in_group_meanings:
          - Eddic plainness rather than modern explanatory friendliness
        out_group_risks:
          - sounding pompous or coercive
        stereotypes_to_avoid:
          - fortune-cookie Norse
      evidence:
        source_refs:
          - poetic_edda:bellows:general
        confidence: medium
      uncertainty:
        open_questions:
          - Which Personas should permit this pattern frequently versus rarely?
        known_limits:
          - A Persona-specific profile should decide final density.
      trace:
        trace_label: gnomic_claim_with_anchor
        must_report_when_used: true
        must_report_when_rejected: true
  orthography_features: []
  code_switching:
    allowed: false
    constraints:
      - Do not insert Old Norse, Icelandic, runic text, or archaic spellings unless a reviewed Persona-specific profile explicitly allows it.
    patterns: []
evidence_ledger:
  - ref: poetic_edda:bellows:general
    source: Henry Adams Bellows translation of the Poetic Edda
    url: https://en.wikisource.org/wiki/The_Poetic_Edda_(tr._Bellows)
    summary: >
      Public-domain English translation of Eddic poems used as a general
      source-tradition reference for mythological figures, wisdom contests,
      prophecy, divine speech, memory, and doom.
  - ref: prose_edda:brodeur:general
    source: Arthur Gilchrist Brodeur translation of the Prose Edda
    url: https://en.wikisource.org/wiki/The_Prose_Edda_(1916_translation_by_Arthur_Gilchrist_Brodeur)
    summary: >
      Public-domain English translation of Snorri's Prose Edda used as a
      general prose source for mythological episodes, names, kennings, and
      figure-specific referents.
