schema_version: weksa.cultural_ontology_profile.v0
profile_id: weksa.subculture.online_game_dev_discord_pre2025.v0
kind: community_of_practice
status: draft_guarded
language:
  codes:
    - en
community:
  regions:
    - online_discord
  speech_community: >
    Pre-2025 GameCult/Aquarium-ish Discord collaboration where game design,
    sound, engineering, jokes, and casual status play cohabit the same rooms.
activation:
  allowed_when:
    - persona_state_references_profile
    - target_medium_is_discord
    - target_period_is_pre_2025_or_history_fixture
  forbidden_when:
    - formal_current_project_doctrine_is_target
salience_axes:
  casual_room_temperature:
    axis_id: casual_room_temperature
    domain: discourse_patterns
    description: Compact, socially alive wording that assumes shared room context.
    relevant_distinctions:
      - distinction_id: banter_over_explanation
        label: Banter over explanation
        meaning: The line may be short, fragmentary, and joke-shaped when context supplies the frame.
        lowering_questions:
          - Can the utterance be one sentence or fragment?
          - Does explanation weaken the social move?
        required_when:
          - fixture_style_tags_include_casual
        forbidden_when:
          - formal_review_or_doctrine_is_requested
        evidence_refs:
          - discord:802911591288537118
          - discord:820077384572338176
linguistic_affordances:
  grammar_features:
    - feature_id: fragmentary_like_comparison
      label: Fragmentary Like comparison
      status: draft
      domain:
        layer: grammar
        category: comparison
        subcategory: fragment
      description: >
        A joke-description may start with "Like..." and remain fragmentary when
        it is an immediate continuation of collaborative design talk.
      realization:
        function: casual_comic_comparison
        surface_strategy: "Like a really terrible <thing> that <absurd property>"
        examples:
          - "Like a really terrible engine that sounds like coconuts when you use it"
      activation:
        allowed_when:
          - collaborative_design_banter
        forbidden_when:
          - standalone_formal_explanation
        requires_profile_authority: true
        minimum_density: light
        maximum_density: normal
      evidence:
        source_refs:
          - discord:802911591288537118
        confidence: medium
  phonology_features: []
  lexicon_features:
    - feature_id: casual_recoil_oof
      label: Casual recoil marker oof
      status: draft
      domain:
        layer: lexicon
        category: stance_marker
        subcategory: embarrassment
      lexical_items:
        - form: oof
          gloss: amused impact or discomfort
          sense: playful_recoil
          register: casual_discord
          allowed_speaker_standing: speaker_can_self_deprecate
          forbidden_senses: []
          collocations:
            - "oof, don't tell me"
      activation:
        allowed_when:
          - compliment_or_trait_read_lands
        forbidden_when:
          - serious_apology_or_harm_context
        requires_profile_authority: true
        minimum_density: light
        maximum_density: light
      evidence:
        source_refs:
          - discord:1037314100931338260
        confidence: high
    - feature_id: mock_challenge_coward
      label: Mock challenge coward
      status: draft
      domain:
        layer: lexicon
        category: stance_marker
        subcategory: friendly_roast
      lexical_items:
        - form: coward
          gloss: mock insult
          sense: friendly_status_challenge
          register: casual_discord
          allowed_speaker_standing: active_banter_with_known_participant
          forbidden_senses:
            - actual_contempt
          collocations:
            - "then you coward"
      activation:
        allowed_when:
          - friendly_roast_context
          - target_has_claimed_competence
        forbidden_when:
          - unknown_relationship
          - serious_conflict
        requires_profile_authority: true
        minimum_density: light
        maximum_density: light
      evidence:
        source_refs:
          - discord:1023727427924545576
        confidence: high
    - feature_id: preserve_self_indexed_technical_label
      label: Preserve self-indexed technical label
      status: draft
      domain:
        layer: lexicon
        category: technical_term
        subcategory: self_indexing
      description: >
        When Persona interlingua frames the speaker through a locally salient
        technical identity label, lowering should preserve that label instead of
        inventing a fresher metaphor. In this subculture, "engineer" can be a
        joked-about identity index, not just an occupation.
      lexical_items:
        - form: engineer
          gloss: technical identity / competence index
          sense: self_indexed_engineering_vibe
          register: casual_discord
          allowed_speaker_standing: speaker_or_room_has_made_engineering_salient
          forbidden_senses:
            - formal_job_title_unless_context_requires
          collocations:
            - engineer vibes
            - engineer-like
      activation:
        allowed_when:
          - persona_interlingua_mentions_engineer_like_or_engineering_salience
          - prior_turn_compliments_efficiency_or_structure
        forbidden_when:
          - interlingua_does_not_name_technical_identity
        requires_profile_authority: true
        minimum_density: light
        maximum_density: light
      constraints:
        register_contexts:
          - casual
        speaker_contexts:
          - metame_or_metacrat_fixture
        grammar_contexts:
          - playful_self_deprecation
        incompatibilities:
          - replacement_identity_metaphor
          - creature_metaphor_substitution
      evidence:
        source_refs:
          - discord:1037314100931338260
        confidence: medium
  discourse_patterns:
    - pattern_id: compact_recoil_no_context_dump
      label: Compact recoil without context dump
      status: draft
      domain:
        layer: discourse
        category: stance_marker
        subcategory: self_deprecation
      interactional_function: answer_trait_read_with_short_mock_wince
      sequence_shape:
        - recoil_marker
        - dont_tell_me_frame
        - possessive_context_object
        - preserved_trait_label
      adjacency_constraints:
        - prior_turn_already_contains_the_explanation
        - generated_line_should_not_quote_or_summarize_prior_turns
      activation:
        allowed_when:
          - playful_self_deprecation
          - prior_turn_compliments_efficiency_or_structure
        forbidden_when:
          - source_intent_requires_explanation
        requires_profile_authority: true
        minimum_density: light
        maximum_density: light
      constraints:
        register_contexts:
          - casual
        speaker_contexts:
          - metame_or_metacrat_fixture
        collocation_limits:
          - target_length_roughly_6_to_12_words
          - avoid_quoted_prior_turn_paraphrase
          - avoid_because_clause
          - avoid_disease_metaphor_unless_interlingua_requests_it
      evidence:
        source_refs:
          - discord:1037314100931338260
        confidence: medium
    - pattern_id: casual_floor_yield_with_lol
      label: Casual floor yield with lol
      status: draft
      domain:
        layer: discourse
        category: turn_taking
        subcategory: floor_yield
      interactional_function: yield_floor_after_riff
      sequence_shape:
        - discourse_pivot_anyway
        - self_silencing_imma_shut_up_now
        - invite_others_to_invent
        - lol_softener
      adjacency_constraints:
        - prior_turns_show_speaker_has_been_riffing
        - other_participants_have_interest_or_pending_contribution
      activation:
        allowed_when:
          - conversational_yield
          - casual_collaborative_ideation
        forbidden_when:
          - formal_moderation
        requires_profile_authority: true
        minimum_density: light
        maximum_density: light
      evidence:
        source_refs:
          - discord:820077384572338176
        confidence: high
  orthography_features:
    - feature_id: light_discord_informality
      label: Light Discord informality
      status: draft
      domain:
        layer: orthography
        category: punctuation
        subcategory: informal_case
      allowed_surface_forms:
        - lower_case_opening
        - markdown_italics_for_single_emphasis
        - no_terminal_period
        - imma
        - lol
      forbidden_surface_forms:
        - heavy_eye_dialect_for_identity_caricature
        - assistant_like_sentence_polishing
      activation:
        allowed_when:
          - casual_discord_register
        forbidden_when:
          - formal_or_public_document_register
        requires_profile_authority: true
        minimum_density: light
        maximum_density: normal
      evidence:
        source_refs:
          - discord:1037314100931338260
          - discord:820077384572338176
        confidence: medium
  code_switching:
    allowed: false
    constraints:
      - This subculture alone does not authorize cross-language switching.
    patterns: []
evidence_ledger:
  - ref: discord:1037314100931338260
    summary: Self-deprecating recoil after efficiency compliment.
  - ref: discord:802911591288537118
    summary: Fragmentary absurd comparison during sound/game design banter.
  - ref: discord:1023727427924545576
    summary: Very short mock-aggressive challenge in friendly roast context.
  - ref: discord:820077384572338176
    summary: Casual profane floor-yield after extended ideation.
