profile_id: weksa.target_cultural_ontology.ja-JP.v0
language:
  code: ja
  locale: ja-JP
  script: Jpan
scope: >
  Bounded Japanese dialogue lowering profile for Weksa fixtures. This profile
  records realization distinctions that must be inspected; it is not a total
  description of Japanese culture.
authority:
  owns:
    - politeness and honorific pressure
    - in-group/out-group stance when context supplies it
    - subject and object omission choices
    - script mix and technical register
    - sentence-final force
  does_not_own:
    - source meaning
    - character identity
    - exhaustive Japanese grammar
salience_axes:
  politeness:
    relevant_distinctions:
      - plain
      - polite
      - honorific
      - humble
      - rough
    lowering_questions:
      - Does politeness preserve the relationship, or does it lie about it?
      - Is roughness character-specific or generic stylization?
  social_position:
    relevant_distinctions:
      - uchi_soto_pressure
      - hierarchy
      - familiarity
      - emergency_override
    lowering_questions:
      - Does urgency override ordinary deference?
      - Does the line imply a relationship the scene has not earned?
  ellipsis:
    relevant_distinctions:
      - subject omission
      - object omission
      - explicit pronoun for emphasis or contrast
    lowering_questions:
      - Is the addressee recoverable without an explicit pronoun?
      - Would explicit pronouns sound unnatural or too pointed?
  script_and_register:
    relevant_distinctions:
      - kanji for technical compounds
      - kana for softness or readability
      - katakana for foreignness, machine texture, or emphasis
    lowering_questions:
      - Does the script choice help the speaker voice?
      - Does a technical compound preserve precision without becoming stiff?
  sentence_final_force:
    relevant_distinctions:
      - direct request
      - warning consequence
      - command
      - threat-like phrasing
    lowering_questions:
      - Does the ending carry warning force without cartoon aggression?
      - Does the line preserve the hazard predicate?
forbidden_flattenings:
  - Do not treat politeness as decoration.
  - Do not use explicit pronouns just because English has them.
  - Do not make every sharp line rough or anime-coded.
  - Do not erase the difference between technical precision and formal politeness.
