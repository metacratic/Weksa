profile_id: weksa.target_cultural_ontology.pt-BR.v0
language:
  code: pt
  locale: pt-BR
  script: Latn
scope: >
  Bounded Brazilian Portuguese dialogue lowering profile. This profile is the
  base Brazilian Portuguese target; regional, class, religious, and community
  registers should be added as explicit overlays rather than silently folded
  into generic pt-BR.
authority:
  owns:
    - Brazilian Portuguese lexical preference
    - treatment and address choices
    - directness versus mitigation
    - regional_or_cultural_overlay_selection
    - idiom naturalness for reviewed fixture prose
  does_not_own:
    - source meaning
    - Brazilian culture as a whole
    - regional or religious-community authority without an explicit overlay
    - target speaker identity
salience_axes:
  treatment:
    relevant_distinctions:
      - voce
      - tu_regionally_marked
      - o_senhor_a_senhora
      - name_or_title_address
    lowering_questions:
      - Is the relationship close, hostile, hierarchical, unknown, or sacred?
      - Does `voce` preserve broad Brazilian naturalness better than `tu`?
      - Is `tu` regionally grounded or just imported flavor?
  directness:
    relevant_distinctions:
      - bare imperative
      - softened imperative
      - warning framed as consequence
      - formal warning
    lowering_questions:
      - Does urgency justify blunt imperative force?
      - Would mitigation make the warning dishonest?
  lexical_locale:
    relevant_distinctions:
      - Brazilian Portuguese terms should be preferred in reviewed pt-BR fixtures
      - European Portuguese defaults must be marked if intentionally used
    lowering_questions:
      - Is a term recognizably Brazilian Portuguese in this context?
      - Is a literal technical word natural enough for dialogue?
  regional_and_cultural_overlay:
    relevant_distinctions:
      - broad_brazilian_default
      - regional_speech_pattern
      - class_or_institutional_register
      - religious_or_ritual_register
      - community_specific_lexicon
    lowering_questions:
      - Does the source context justify an overlay?
      - Is the overlay owned by a named profile?
      - Would applying the overlay stereotype the speaker or setting?
  metaphor:
    relevant_distinctions:
      - technical metaphors can preserve character ontology
      - over-literal metaphors may sound translated rather than spoken
    lowering_questions:
      - Does the metaphor still sound like the speaker?
      - Does it preserve the warning instead of becoming decorative?
forbidden_flattenings:
  - Do not label output as Portuguese without a locale in reviewed fixtures.
  - Do not default to European Portuguese wording when the target is pt-BR.
  - Do not treat Brazilian Portuguese as one culture, region, class, or religion.
  - Do not add regional or religious markers without a cited overlay profile and source-context reason.
  - Do not soften a warning merely because directness feels impolite in English review.
overlay_catalog: data/target-language-ontology/pt-BR-overlays.yaml
