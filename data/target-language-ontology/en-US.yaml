profile_id: weksa.target_cultural_ontology.en-US.v0
language:
  code: en
  locale: en-US
  script: Latn
scope: >
  Bounded English dialogue lowering profile for current Weksa fixtures. This is
  not a claim about all English-speaking cultures.
authority:
  owns:
    - address directness choices
    - casual versus formal register
    - technical metaphor legibility
    - understatement or sarcasm risk
  does_not_own:
    - source meaning
    - speaker identity
    - whole-culture description
salience_axes:
  address:
    relevant_distinctions:
      - direct second person is acceptable when scene context names the addressee
      - imperative force can be softened or sharpened through wording
    lowering_questions:
      - Does direct address preserve the speech act?
      - Does softening erase urgency?
  register:
    relevant_distinctions:
      - casual
      - technical
      - formal
      - intimate
      - institutional
    lowering_questions:
      - Is technical language character pressure or exposition sludge?
      - Does sarcasm obscure the actual warning?
  agency:
    relevant_distinctions:
      - explicit agent responsibility is usually available
      - passive phrasing can hide authority or blame
    lowering_questions:
      - Should the speaker own the intervention directly?
      - Does the line preserve who is at risk?
linguistic_affordances:
  grammar_features:
    - feature_id: en_us_direct_imperative_warning
      label: Direct imperative warning
      status: draft
      domain:
        layer: grammar
        category: clause_mood
        subcategory: imperative
      description: >
        Broad en-US allows direct imperatives for urgent safety warnings when
        the speaker has standing to intervene and the scene rewards clarity
        over mitigation.
      formal_conditions:
        syntactic_environment:
          - main_clause
          - direct_address_optional
        semantic_inputs:
          - warning
          - addressee_action_to_stop_or_avoid
          - consequence_or_risk_available
        required_interlingua_fields:
          - speech_act
          - addressee
          - prohibited_action
      realization:
        function: stop_or_prevent_action
        surface_strategy: bare_imperative_or_do_not_imperative
        examples:
          - "Don't touch the damaged control."
      activation:
        allowed_when:
          - scene_has_immediate_risk
          - speaker_has_contextual_authority_or_care_relation
        forbidden_when:
          - politeness_softening_is_required_by_target_profile
          - imperative_would_falsely_imply_hierarchy
        requires_profile_authority: false
        minimum_density: light
        maximum_density: normal
      constraints:
        grammar_contexts:
          - avoid_if_source_requires_indirect_request
        register_contexts:
          - casual
          - technical
          - emergency
        speaker_contexts:
          - known_addressee
          - operator_warning
        incompatibilities:
          - generic_assistant_over_politeness
      indexicality:
        social_meanings:
          - urgency
          - clarity
          - responsibility
        in_group_meanings: []
        out_group_risks:
          - may sound abrupt if the scene is not urgent
        stereotypes_to_avoid: []
      evidence:
        source_refs:
          - schemas/cultural-ontology-profile.md
        qdrant_source_ids: []
        cached_source_refs: []
        source_hashes: []
        reviewer_refs: []
        confidence: medium
      uncertainty:
        open_questions:
          - Should a later en-US regional overlay override imperative force?
        known_limits:
          - Base en-US does not model regional, racialized, or contact-language
            dialect grammar.
      trace:
        trace_label: direct_imperative_warning
        must_report_when_used: true
        must_report_when_rejected: true
  phonology_features: []
  lexicon_features: []
  discourse_patterns: []
  orthography_features: []
  code_switching:
    allowed: false
    constraints:
      - Base en-US profile does not authorize contact-language switching.
    patterns: []
forbidden_flattenings:
  - Do not treat English as the neutral source for other target languages.
  - Do not use generic assistant politeness when a character voice is required.
  - Do not let sarcasm replace the actual predicate being lowered.
