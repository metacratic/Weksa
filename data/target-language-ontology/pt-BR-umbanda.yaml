profile_id: weksa.target_cultural_ontology.pt-BR.umbanda.v0
language:
  code: pt
  locale: pt-BR
  script: Latn
overlay:
  base_profile: data/target-language-ontology/pt-BR.yaml
  kind: religious_cultural_register
scope: >
  Optional Brazilian Portuguese cultural ontology overlay for Umbanda-related
  scenes, speakers, ritual contexts, or referents. This profile is a consent and
  context gate, not a decorative vocabulary pack.
authority:
  owns:
    - whether Umbanda-specific register is allowed for a realization
    - sacred or ritual address caution
    - house/tradition specificity warnings
    - syncretic and entity-reference sensitivity
    - anti-caricature constraints
  does_not_own:
    - Umbanda doctrine as a whole
    - authority to invent ritual speech
    - generic Brazilian Portuguese
    - speaker identity unless the speaker context explicitly supplies it
activation_requirements:
  any_required:
    - source context names an Umbanda scene, terreiro, practitioner, entity, ritual, or discourse community
    - speaker profile explicitly owns an Umbanda-informed voice or memory
    - authoring metadata requests this overlay for reviewed cultural grounding
  never_activate_for:
    - generic Brazilian flavor
    - jokes, insults, mystic ambience, or unexplained exotic texture
    - non-Umbanda religious scenes unless the source context makes a syncretic relation explicit
salience_axes:
  sacred_address:
    relevant_distinctions:
      - ordinary dialogue
      - respectful reference
      - ritual address
      - entity_or_guide_reference
    lowering_questions:
      - Is the line ordinary speech or ritualized speech?
      - Does the speaker have standing to use sacred address?
      - Should a term be left general until a human reviewer approves specificity?
  house_specificity:
    relevant_distinctions:
      - practices and terms can vary by house, region, and lineage
      - generic flattening can become false authority
    lowering_questions:
      - Is the output pretending one practice represents all Umbanda?
      - Should the trace mark the choice as house-specific or uncertain?
  syncretic_reference:
    relevant_distinctions:
      - Catholic, African, Indigenous, Spiritist, and local references may coexist differently by context
      - entity names and roles are not interchangeable decoration
    lowering_questions:
      - Does the source actually contain the syncretic relation?
      - Does the line preserve respect without overexplaining?
  anti_caricature:
    relevant_distinctions:
      - religious register
      - folkloric stereotype
      - occult ambience
    lowering_questions:
      - Is the output using Umbanda as culture, faith, and practice rather than spooky texture?
      - Would a practitioner recognize this as respectful enough for review?
forbidden_flattenings:
  - Do not use Umbanda terms as generic magic flavor.
  - Do not invent ritual formulas.
  - Do not collapse Umbanda into Candomblé, Spiritism, Catholicism, or generic Afro-Brazilian religion.
  - Do not imply all Brazilian Portuguese religious language is Umbanda-coded.
  - Do not activate this overlay unless source context or authoring metadata explicitly asks for it.
