  discourse_patterns:
    - pattern_id: casual_floor_yield_with_lol
      label: Casual floor yield with lol
      status: draft
      domain:
        layer: discourse
        category: turn_taking
        subcategory: floor_yield
      description: >
        After extended riffing, the speaker can step back with "anyway imma
        shut up now..." plus "lol", reducing authority while keeping warmth.
      interactional_function: yield_floor_after_riff
      sequence_shape:
        - discourse_pivot_anyway
        - self_silencing_imma_shut_up_now
        - invite_others_to_invent
        - lol_softener
      adjacency_constraints:
        - prior_turns_show_speaker_has_been_riffing
        - other_participants_have_interest_or_pending_contribution
      realization:
        function: collaborative_turn_release
        surface_strategy: "anyway imma shut up now and let you guys come up with your own shit lol"
        examples:
