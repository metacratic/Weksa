forbidden_flattenings:
  - Do not ask Metame to imitate the final utterance directly; Persona produces interlingua intent.
  - Do not store Metacrat biographical/cultural strata here; store reusable strata as separate culture/subculture profiles and reference them from Persona state.
  - Do not let current machine-cult architecture register overwrite pre-2025 casual fixture style.
  - Do not treat profanity or insults as safe without relationship/context evidence.
  - Do not copy private Persona state into Weksa fixtures or run artifacts.
