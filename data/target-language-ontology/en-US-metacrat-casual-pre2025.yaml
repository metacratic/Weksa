  orthography_features:
    - feature_id: light_discord_informality
      label: Light Discord informality
      status: draft
      domain:
        layer: orthography
        category: punctuation
        subcategory: informal_case
      description: >
        Casual lines may use lower-case openings, sparse punctuation, emphasis
        with markdown italics, and uncorrected informal contractions when the
        social move benefits.
      allowed_surface_forms:
        - lower_case_opening
        - markdown_italics_for_single_emphasis
        - no_terminal_period
        - imma
        - lol
      forbidden_surface_forms:
        - heavy_eye_dialect_for_identity_caricature
        - assistant_like_sentence_polishing
      renderer_notes: >
        Preserve compactness. Do not add terminal politeness, explanation, or
        moral framing unless source meaning requires it.
      realization:
        function: casual_discord_texture
        surface_strategy: allow sparse punctuation and compact informal markers
        examples:
