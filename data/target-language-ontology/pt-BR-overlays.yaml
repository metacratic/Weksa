catalog_id: weksa.target_cultural_ontology.pt-BR.overlays.v0
base_profile: data/target-language-ontology/pt-BR.yaml
scope: >
  Catalog of optional Brazilian Portuguese regional and cultural overlay slots.
  An overlay slot is not permission to imitate a community. It is a named place
  where reviewed, source-grounded distinctions can live.
activation_rule: >
  Use the broad pt-BR profile by default. Add an overlay only when source
  context, speaker state, setting documentation, or authoring metadata names the
  relevant region, community, institution, religion, or register.
overlay_slots:
  - overlay_id: broad_brazilian_default
    status: active_base_mode
    profile_ref: data/target-language-ontology/pt-BR.yaml
    owns:
      - broadly legible Brazilian Portuguese dialogue
    does_not_own:
      - regional specificity
      - religious-cultural specificity
  - overlay_id: rio_urban
    status: planned_profile
    profile_ref:
    owns_when_defined:
      - Rio de Janeiro urban speech/register pressures for specific characters or settings
    blocked_until:
      - reviewed source context
      - human-approved examples
  - overlay_id: sao_paulo_urban
    status: planned_profile
    profile_ref:
    owns_when_defined:
      - Sao Paulo urban speech/register pressures for specific characters or settings
    blocked_until:
      - reviewed source context
      - human-approved examples
  - overlay_id: northeast_regional
    status: planned_profile
    profile_ref:
    owns_when_defined:
      - Northeast Brazilian regional speech/register pressures for specific characters or settings
    blocked_until:
      - specific region named
      - reviewed examples
      - human approval
  - overlay_id: south_regional
    status: planned_profile
    profile_ref:
    owns_when_defined:
      - South Brazilian regional speech/register pressures for specific characters or settings
    blocked_until:
      - specific region named
      - reviewed examples
      - human approval
  - overlay_id: amazonian_regional
    status: planned_profile
    profile_ref:
    owns_when_defined:
      - Amazonian regional speech/register pressures for specific characters or settings
    blocked_until:
      - specific region or community named
      - reviewed examples
      - human approval
  - overlay_id: umbanda
    status: active_guarded_overlay
    profile_ref: data/target-language-ontology/pt-BR-umbanda.yaml
    owns:
      - Umbanda-related register gating
      - sacred address caution
      - anti-caricature constraints
    blocked_until:
      - source context or authoring metadata explicitly activates Umbanda context
forbidden_flattenings:
  - Do not use a planned overlay as if it were defined.
  - Do not treat regional slots as accent generators.
  - Do not use religious-cultural overlays for ambience.
  - Do not collapse race, region, religion, class, and slang into one Brazilian flavor.
