findings:
  - severity: minor
    category: meaning_preservation
    note: "The warning preserves the damaged control, unsafe touch, and Nibu's intervention. The added live-current detail is plausible from the projected cockpit context, but it is a specific hazard inference rather than an explicit interlingua fact."
  - severity: minor
    category: naturalness
    note: "触るな is acceptable for urgent, abrasive Nibu speech in a tense cockpit moment. It is blunt, but the profile explicitly allows plain negative imperative warnings."
  - severity: major
    category: naturalness
    note: "指を焼くぞ is understandable, but it sounds more dramatic and written than the most natural contemporary Kanto hazard warning. With 通電してる already active, 感電するぞ is more idiomatic, technical, and immediate."
  - severity: minor
    category: caricature_risk
    note: "The line does not use Kansai markers, historical archaism, catchphrases, or explicit anime stock particles. The only drift risk is the stacked roughness of 触るな plus 焼くぞ, which can lean tough-character if repeated across many lines."
  - severity: info
    category: ellipsis
    note: "Argument ellipsis works well. The addressee and affected body are recoverable from context, and the line avoids English-style pronoun pressure."
  - severity: info
    category: orthography
    note: "Mixed kanji-kana script is normal and readable for contemporary Japanese. 制御盤 and 通電 carry the desired technical register."
recommended_spoken_text: "その破損した制御盤に触るな。まだ通電してる。感電するぞ。"
revision_reason: "This keeps the clipped plain imperative and Nibu's abrasive protection while replacing the less idiomatic 指を焼くぞ with the more natural technical warning 感電するぞ. 破損した is also slightly more ordinary for damaged equipment than 損傷した in this spoken cockpit context."
