schema_version: weksa.persona_lowering_fixture_batch.v0
fixture_id: metame-casual-pre2025
speaker_id: metame
target_register:
  language: en-US
  channel: Discord
  period: pre-2025
  style_tags:
    - casual
    - conversational
    - self_deprecating
    - playful_status
    - design_banter
items:
  - id: engineer-vibes
    communicative_act: playful_self_deprecation
    scene:
      channel: general
      year: 2022
      prior_turns:
        - speaker: metame
          meaning: The server has many topic channels because the speaker has opinions about everything.
        - speaker: metame
          meaning: If no suitable channel exists, the other person can use general chat or request a new one.
        - speaker: other
          meaning: The other person compliments the speaker's efficiency.
    intent:
      summary: React with mock concern that the server organization makes the speaker seem too engineer-like.
      stance:
        affect: amused_embarrassment
        relation: friendly
        self_positioning: admits being an engineer while resisting the vibe
      constraints:
        - short Discord message
        - casual lower-case or lightly informal punctuation is acceptable
        - preserve the word engineer if natural
  - id: coconut-engine
    communicative_act: comic_description
    scene:
      channel: soundtrack
      year: 2021
      prior_turns:
        - speaker: metame
          meaning: A full alternate sound set is probably too much work.
        - speaker: metame
          meaning: A more plausible idea is gear that carries distinctive troll-themed sounds.
        - speaker: other
          meaning: The other person laughs.
    intent:
      summary: Describe a deliberately awful engine sound with an absurd coconut comparison.
      stance:
        affect: joking
        relation: collaborative_design_banter
        self_positioning: improvising a silly game-feel example
      constraints:
        - short Discord message
        - must be more joke than technical explanation
        - may use "like" framing
  - id: engineer-coward
    communicative_act: playful_challenge
    scene:
      channel: pics
      year: 2022
      prior_turns:
        - speaker: metame
          meaning: The speaker tells the other person to think better.
        - speaker: other
          meaning: The other person says they think like an engineer while high.
        - speaker: metame
          meaning: The speaker doubts that claim.
    intent:
      summary: Challenge the other person to prove it by engineering something, with mock aggression.
      stance:
        affect: teasing
        relation: friendly_roast
        self_positioning: socially dominant but playful
      constraints:
        - very short
        - should include a challenge
        - "coward" is allowed if it fits the line
  - id: shut-up-now
    communicative_act: conversational_yield
    scene:
      channel: prose
      year: 2021
      prior_turns:
        - speaker: metame
          meaning: The speaker has been riffing on setting ideas around sentient stars and side quests.
        - speaker: other
          meaning: Another participant shows interest.
    intent:
      summary: Stop dominating the idea thread and invite others to invent their own material.
      stance:
        affect: amused_restraint
        relation: collaborative
        self_positioning: stepping back after riffing too much
      constraints:
        - casual Discord phrasing
        - may include "lol"
        - should sound like yielding the floor, not formal facilitation
