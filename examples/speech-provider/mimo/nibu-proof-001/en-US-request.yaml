    Bright young anime protagonist voice, strongly loli-coded in presentation:
    small, sharp, cute by design, intensely expressive, and instantly characterful,
    like a dangerous sci-fi visual-novel heroine trapped inside a damaged
    starship. She speaks through cockpit audio while warning the player away
    from damaged live hardware. Keep the cute/small social coding as product
    residue and leverage, never flirtation or innocent helplessness. Use a
    higher youthful timbre, crisp anime-style emotional attack, clipped
    visual-novel timing, contained urgency, low warmth, sharp articulation, and
    faint tired contempt. Let the technical precision live inside the anime
    performance; do not turn it into a dry technical-assistant delivery. Avoid
    realistic adult assistant tone, soothing customer-service voice, cheerful
    mascot energy, and theatrical villainy.
