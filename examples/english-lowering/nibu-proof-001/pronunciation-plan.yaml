trace:
  decisions:
    - Used broad General American IPA.
    - Kept first "your" unreduced for command clarity.
    - Reduced "to" to schwa in the consequence clause.
    - Inserted phrase boundary after "control" to match warning delivery.
  uncertainties:
    - "off" may be /ɑf/ for some General American speakers.
    - "your" may reduce toward /jɚ/ depending on voice profile.
    - "diagram" stress varies; this pass keeps CMUdict-style first primary stress with later secondary stress.
